<html lang="vi">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0b0e;
            --bg-sidebar: #121216;
            --bg-card: #181820;
            --bg-card-hover: #22222d;
            --bg-active: #2a2a3a;
            --border-color: #242430;
            --text-primary: #f5f5f7;
            --text-secondary: #9ea0a5;
            --color-spam: #ff3b30;
            --color-spam-bg: rgba(255, 59, 48, 0.15);
            --color-ham: #34c759;
            --color-ham-bg: rgba(52, 199, 89, 0.15);
            --font-main: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #007aff, #5856d6);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
        }

        .stat-item span {
            font-weight: 600;
        }
        .stat-item.spam span { color: var(--color-spam); }
        .stat-item.ham span { color: var(--color-ham); }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar & Filters */
        .sidebar {
            width: 380px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .filter-bar {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background-color: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background-color: #007aff;
            border-color: #007aff;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.2);
        }

        .email-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2f2f3e;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #44445c;
        }

        .email-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .email-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: transparent;
            transition: background-color 0.2s ease;
        }

        .email-card.spam::before {
            background-color: var(--color-spam);
        }

        .email-card.ham::before {
            background-color: var(--color-ham);
        }

        .email-card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-1px);
        }

        .email-card.active {
            background-color: var(--bg-active);
            border-color: #3b3b4f;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .email-badge {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }

        .email-badge.spam {
            color: var(--color-spam);
            background-color: var(--color-spam-bg);
        }

        .email-badge.ham {
            color: var(--color-ham);
            background-color: var(--color-ham-bg);
        }

        .card-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .card-subject {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-preview {
            font-size: 12px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            gap: 16px;
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .email-detail {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            padding: 30px;
        }

        .detail-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .detail-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-subject {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .detail-sender-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: #2b2b3a;
            color: var(--text-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .detail-body-container {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        .detail-body {
            font-size: 15px;
            line-height: 1.6;
            color: #d1d2d6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.25s ease forwards;
        }
    </style>

        let currentFilter = 'all';
        let activeId = null;

        function renderList() {
            const listContainer = document.getElementById('emailList');
            listContainer.innerHTML = '';

            const filteredEmails = emails.filter(e => {
                if (currentFilter === 'all') return true;
                return e.label === currentFilter;
            });

            filteredEmails.forEach(e => {
                const card = document.createElement('div');
                card.className = `email-card ${e.label} ${e.id === activeId ? 'active' : ''}`;
                card.onclick = () => selectEmail(e.id);

                // Create short preview text
                const preview = e.message.substring(0, 120) + (e.message.length > 120 ? '...' : '');

                card.innerHTML = `
                    <div class="card-header">
                        <span class="email-badge ${e.label}">${e.label === 'spam' ? 'Spam' : 'Ham'}</span>
                        <span class="card-date">${e.date !== 'N/A' ? e.date : ''}</span>
                    </div>
                    <div class="card-subject">${e.subject || '(Không có tiêu đề)'}</div>
                    <div class="card-preview">${preview || '(Nội dung trống)'}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        function selectEmail(id) {
            activeId = id;
            const email = emails.find(e => e.id === id);
            if (!email) return;

            // Update list active states
            renderList();

            // Hide empty state, show detail panel
            document.getElementById('emptyState').style.display = 'none';
            const detailPanel = document.getElementById('emailDetail');
            detailPanel.style.display = 'flex';
            
            // Add fade animation class
            detailPanel.classList.remove('animate-fade');
            void detailPanel.offsetWidth; // Trigger reflow to restart animation
            detailPanel.classList.add('animate-fade');

            // Set detail contents
            document.getElementById('detailSubject').innerText = email.subject || '(Không có tiêu đề)';
            document.getElementById('detailDate').innerText = email.date !== 'N/A' ? email.date : 'Unknown Date';
            
            const badge = document.getElementById('detailBadge');
            badge.innerText = email.label === 'spam' ? 'Spam' : 'Ham';
            badge.className = `email-badge ${email.label}`;

            // Avatar initial
            const initial = email.subject ? email.subject.trim().substring(0, 1).toUpperCase() : 'E';
            document.getElementById('detailAvatar').innerText = /^[a-zA-Z]$/.test(initial) ? initial : 'E';

            // Raw message text
            document.getElementById('detailBody').innerText = email.message || '(Nội dung trống)';
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            
            // Update filter button active classes
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(filterType)) {
                    btn.classList.add('active');
                }
            });

            renderList();
        }

        // Initial render
        renderList();
    </script>
